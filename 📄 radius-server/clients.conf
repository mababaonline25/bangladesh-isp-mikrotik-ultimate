# ============================================================================
# FreeRADIUS Clients Configuration
# Version: 5.0.0
# Description: RADIUS client configuration for NAS devices
# ============================================================================

# ============================================================================
# Localhost
# ============================================================================

client localhost {
    ipaddr = 127.0.0.1
    secret = testing123
    require_message_authenticator = no
    shortname = localhost
    nas_type = other
}

# ============================================================================
# MikroTik Routers
# ============================================================================

# Main Router
client main_router {
    ipaddr = 192.168.20.1
    secret = CHANGE-THIS-SECRET
    shortname = main-router
    nas_type = mikrotik
    require_message_authenticator = no
    virtual_server = default
    proto = *
    limit {
        max_connections = 16
        lifetime = 0
        idle_timeout = 30
    }
}

# Backup Router
client backup_router {
    ipaddr = 10.1.200.2
    secret = CHANGE-THIS-BACKUP-SECRET
    shortname = backup-router
    nas_type = mikrotik
    require_message_authenticator = no
    virtual_server = default
    proto = *
    limit {
        max_connections = 16
        lifetime = 0
        idle_timeout = 30
    }
}

# POP Routers
client pop_router_1 {
    ipaddr = 10.1.201.1
    secret = CHANGE-THIS-POP1-SECRET
    shortname = pop-1
    nas_type = mikrotik
    require_message_authenticator = no
}

client pop_router_2 {
    ipaddr = 10.1.201.2
    secret = CHANGE-THIS-POP2-SECRET
    shortname = pop-2
    nas_type = mikrotik
    require_message_authenticator = no
}

client pop_router_3 {
    ipaddr = 10.1.201.3
    secret = CHANGE-THIS-POP3-SECRET
    shortname = pop-3
    nas_type = mikrotik
    require_message_authenticator = no
}

# ============================================================================
# BDIX Peering
# ============================================================================

client bdix_peer {
    ipaddr = 172.16.100.1
    secret = CHANGE-THIS-BDIX-SECRET
    shortname = bdix-peer
    nas_type = other
    require_message_authenticator = no
}

# ============================================================================
# IIG Upstreams
# ============================================================================

client iig_primary {
    ipaddr = 103.xxx.xxx.1
    secret = CHANGE-THIS-IIG1-SECRET
    shortname = iig-primary
    nas_type = other
    require_message_authenticator = no
}

client iig_backup {
    ipaddr = 103.yyy.yyy.1
    secret = CHANGE-THIS-IIG2-SECRET
    shortname = iig-backup
    nas_type = other
    require_message_authenticator = no
}

# ============================================================================
# All Networks (for dynamic clients)
# ============================================================================

client all_networks {
    ipaddr = 0.0.0.0/0
    secret = radius-secret
    shortname = any-nas
    require_message_authenticator = no
    nas_type = other
}