# ============================================================================
# RadSec Server Configuration
# Version: 5.0.0
# Description: Secure RADIUS (RadSec) configuration
# ============================================================================

# ============================================================================
# RadSec Global Settings
# ============================================================================

radsec {
    # Enable RadSec
    enabled = yes
    
    # Server Settings
    server {
        ipv4 = 0.0.0.0
        ipv6 = ::
        port = 2083
    }
    
    # TLS Settings
    tls {
        certificate_file = ${certdir}/server.pem
        private_key_file = ${certdir}/server.key
        ca_file = ${certdir}/ca.pem
        dh_file = ${certdir}/dh
        random_file = ${certdir}/random
        
        # Cipher Settings
        cipher_list = "ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256"
        
        # TLS Versions
        min_tls_version = "1.2"
        max_tls_version = "1.3"
        
        # CRL
        check_crl = no
        crl_file = ${certdir}/crl.pem
        
        # Certificate Verification
        verify_certificate = yes
        verify_depth = 3
    }
    
    # Authentication
    auth {
        # Require client certificate
        require_client_cert = yes
        
        # Client certificate CN
        require_cert_cn = no
    }
    
    # Accounting
    accounting {
        port = 2083
    }
    
    # CoA (Change of Authorization)
    coa {
        port = 3799
        secret = CHANGE-THIS-COA-SECRET
    }
    
    # Keepalive
    keepalive {
        interval = 30
        timeout = 10
        retries = 3
    }
}

# ============================================================================
# RadSec Clients
# ============================================================================

client radsec_client_1 {
    ipaddr = 192.168.20.1
    secret = CHANGE-THIS-SECRET
    shortname = main-router
    nas_type = mikrotik
    radsec = yes
    require_client_cert = yes
    certificate_file = ${certdir}/client.pem
}

client radsec_client_2 {
    ipaddr = 10.1.200.2
    secret = CHANGE-THIS-BACKUP-SECRET
    shortname = backup-router
    nas_type = mikrotik
    radsec = yes
    require_client_cert = yes
    certificate_file = ${certdir}/client.pem
}

# ============================================================================
# RadSec Policies
# ============================================================================

policy radsec_policy {
    # Authorization
    authorize {
        sql
        files
    }
    
    # Accounting
    accounting {
        sql
    }
    
    # Session
    session {
        sql
    }
}